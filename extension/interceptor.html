<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feluda AI | Neural Verification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0B0F19;
            --accent: #00E5FF;
            --surface: #111827;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 50% 50%, rgba(0, 229, 255, 0.03) 0%, transparent 70%);
        }

        .loader-container {
            text-align: center;
            max-width: 400px;
            width: 90%;
            position: relative;
        }

        .logo-ring {
            width: 80px;
            height: 80px;
            margin: 0 auto 32px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ring {
            position: absolute;
            inset: 0;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .ring-active {
            position: absolute;
            inset: 0;
            border: 2px solid transparent;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            filter: drop-shadow(0 0 8px var(--accent));
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 100px;
            color: var(--accent);
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .url-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #64748b;
            word-break: break-all;
            margin-bottom: 32px;
            opacity: 0.6;
            max-height: 40px;
            overflow: hidden;
        }

        .progress-bar {
            height: 2px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 30%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            animation: progressMove 2s ease-in-out infinite;
        }

        @keyframes progressMove {
            0% {
                left: -30%;
                width: 30%;
            }

            50% {
                width: 60%;
            }

            100% {
                left: 100%;
                width: 30%;
            }
        }

        .terminal-log {
            margin-top: 24px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            text-align: left;
            color: #475569;
            height: 60px;
            overflow: hidden;
        }

        .log-entry {
            margin-bottom: 4px;
            display: flex;
            gap: 8px;
        }

        .log-entry span:first-child {
            color: var(--accent);
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <div class="loader-container">
        <div class="logo-ring">
            <div class="ring"></div>
            <div class="ring-active"></div>
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent)">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"></path>
            </svg>
        </div>

        <div class="status-badge">Neural Sweep Active</div>
        <h1>Securing Connection</h1>
        <div class="url-display" id="url-text">Synchronizing inference node...</div>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <div class="terminal-log" id="log-container">
            <div class="log-entry"><span>></span> Initializing defensive mesh...</div>
            <div class="log-entry"><span>></span> Calibrating heuristic filters...</div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="interceptor.js"></script>
</body>

</html>
