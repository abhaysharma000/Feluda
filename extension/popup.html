<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feluda AI — Threat Shield</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --navy-950: #000000;
            --navy-900: #0a192f;
            --cyan-accent: #10b981;
            --danger: #ff3b3b;
            --warning: #facc15;
            --success: #10b981;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 320px;
            font-family: 'Inter', sans-serif;
            background: var(--navy-950);
            color: #f8fafc;
            overflow: hidden;
            border-radius: 20px;
        }

        .container {
            padding: 20px;
            background: linear-gradient(135deg, var(--navy-900) 0%, var(--navy-950) 100%);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 14px;
        }

        .logo i {
            color: var(--cyan-accent);
        }

        .settings-btn {
            background: var(--glass);
            border: 1px solid var(--border);
            width: 32px;
            height: 32px;
            border-radius: 10px;
            color: #94a3b8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        /* Animated Risk Indicator */
        .status-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .risk-ring {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .ring-svg {
            transform: rotate(-90deg);
        }

        .ring-bg {
            fill: none;
            stroke: var(--navy-900);
            stroke-width: 8;
        }

        .ring-progress {
            fill: none;
            stroke: var(--success);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 339;
            stroke-dashoffset: 339;
            transition: stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.5s;
        }

        .risk-value {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .risk-number {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: white;
        }

        .risk-label {
            font-size: 8px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        /* Information Panels */
        .info-panel {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            transition: 0.3s;
        }

        .info-panel:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .panel-title {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .panel-content {
            margin-top: 12px;
            font-size: 12px;
            line-height: 1.5;
            color: #cbd5e1;
            display: none;
        }

        .panel-content.active {
            display: block;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Toggle Switch */
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .toggle-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .toggle-label {
            font-size: 11px;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .toggle-desc {
            font-size: 9px;
            color: #64748b;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #334155;
            transition: .4s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--cyan-accent);
        }

        input:checked+.slider:before {
            transform: translateX(14px);
        }

        .tip-card {
            background: linear-gradient(to bottom right, rgba(0, 229, 255, 0.05), rgba(0, 229, 255, 0));
            border: 1px solid rgba(0, 229, 255, 0.1);
            padding: 12px;
            border-radius: 12px;
            display: flex;
            gap: 10px;
        }

        .tip-card i {
            color: var(--cyan-accent);
            font-size: 14px;
            margin-top: 2px;
        }

        .tip-text {
            font-size: 11px;
            color: #94a3b8;
        }

        .footer {
            margin-top: 16px;
            text-align: center;
            font-size: 10px;
            color: #475569;
        }

        .btn-dashboard {
            display: block;
            width: 100%;
            padding: 12px;
            background: var(--cyan-accent);
            color: var(--navy-950);
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            margin-top: 16px;
            transition: 0.2s;
            text-align: center;
            text-decoration: none;
        }

        .btn-dashboard:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <div class="logo-text">
                    <h2>FELUDA</h2>
                    <span>AI DEFENSIVE MESH</span>
                </div>
            </div>
            <button class="icon-btn" id="open-dashboard-btn" title="Open Neural Command">
                <i class="fas fa-layer-group"></i>
            </button>
        </header>

        <div class="main-stats">
            <div class="risk-meter-container">
                <svg class="risk-svg" viewBox="0 0 100 100">
                    <circle class="risk-bg" cx="50" cy="50" r="45" />
                    <circle id="risk-circle" class="risk-progress" cx="50" cy="50" r="45" />
                </svg>
                <div class="risk-content">
                    <span id="risk-score">--</span>
                    <label>THREAT_IDX</label>
                </div>
            </div>
            <div id="status-badge" class="status-badge protected">
                <div class="pulse-dot"></div>
                <span>SYSTEM OPTIMAL</span>
            </div>
        </div>

        <div class="mesh-controls">
            <div class="control-card">
                <div class="control-info">
                    <label>NEURAL LINK SHIELD</label>
                    <span id="shield-status">Real-time heuristics active</span>
                </div>
                <label class="premium-switch">
                    <input type="checkbox" id="link-shield-toggle">
                    <span class="premium-slider"></span>
                </label>
            </div>
        </div>

        <div class="intelligence-overview">
            <div class="intel-card">
                <div class="intel-header" id="why-toggle">
                    <div class="intel-title">
                        <i class="fas fa-brain"></i>
                        <span>Neural Reasoning</span>
                    </div>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div class="intel-body" id="why-content">
                    Initialize scan to see real-time heuristic attribution across specific vectors.
                </div>
            </div>
        </div>

        <div class="session-brief">
            <div class="brief-item">
                <label>SCANNED</label>
                <span id="verified-count">0</span>
            </div>
            <div class="divider"></div>
            <div class="brief-item threat">
                <label>NEUTRALIZED</label>
                <span id="threat-count">0</span>
            </div>
        </div>

        <button id="open-live-deck-btn" class="primary-action">
            <span>OPEN LIVE COMMAND</span>
            <i class="fas fa-arrow-right"></i>
        </button>

        <footer>
            <div class="engine-info">
                <span>ENGINE V2.4</span>
                <span><i class="fas fa-microchip"></i> SOC NODE 1</span>
            </div>
        </footer>
    </div>

    <script src="config.js"></script>
    <script src="popup.js"></script>
</body>

</html>
