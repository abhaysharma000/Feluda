<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feluda AI — Threat Shield</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <div class="logo-text">
                    <h2>FELUDA</h2>
                    <span>AI DEFENSIVE MESH</span>
                </div>
            </div>
            <button class="icon-btn" id="open-dashboard-btn" title="Open Neural Command">
                <i class="fas fa-layer-group"></i>
            </button>
        </header>

        <div class="main-stats">
            <div class="risk-meter-container">
                <svg class="risk-svg" viewBox="0 0 100 100">
                    <circle class="risk-bg" cx="50" cy="50" r="45" />
                    <circle id="risk-circle" class="risk-progress" cx="50" cy="50" r="45" />
                </svg>
                <div class="risk-content">
                    <span id="risk-score">--</span>
                    <label>THREAT_IDX</label>
                </div>
            </div>
            <div id="status-badge" class="status-badge protected">
                <div class="pulse-dot"></div>
                <span>SYSTEM OPTIMAL</span>
            </div>
        </div>

        <div class="mesh-controls">
            <div class="control-card">
                <div class="control-info">
                    <label>NEURAL LINK SHIELD</label>
                    <span id="shield-status">Real-time heuristics active</span>
                </div>
                <label class="premium-switch">
                    <input type="checkbox" id="link-shield-toggle">
                    <span class="premium-slider"></span>
                </label>
            </div>
        </div>

        <div class="intelligence-overview">
            <div class="intel-card">
                <div class="intel-header" id="why-toggle">
                    <div class="intel-title">
                        <i class="fas fa-brain"></i>
                        <span>Neural Reasoning</span>
                    </div>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div class="intel-body" id="why-content">
                    Initialize scan to see real-time heuristic attribution across specific vectors.
                </div>
            </div>
        </div>

        <div class="session-brief" id="live-scan-stats">
            <div class="brief-item">
                <label>SCANNED</label>
                <span id="verified-count">0</span>
            </div>
            <div class="divider"></div>
            <div class="brief-item threat">
                <label>NEUTRALIZED</label>
                <span id="threat-count">0</span>
            </div>
        </div>

        <button id="open-live-deck-btn" class="primary-action">
            <span>OPEN LIVE COMMAND</span>
            <i class="fas fa-arrow-right"></i>
        </button>

        <footer>
            <div class="engine-info">
                <span>ENGINE V2.4</span>
                <span><i class="fas fa-microchip"></i> SOC NODE 1</span>
            </div>
        </footer>
    </div>

    <script src="config.js"></script>
    <script src="popup.js"></script>
</body>

</html>
